  <text x="125.0" y="1944.0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#334155" text-anchor="start">3. Clean dates, ZIP codes, duplicates, and coordinates</text>
  <text x="125.0" y="1992.0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#334155" text-anchor="start">4. Aggregate by month and ZIP code</text>
