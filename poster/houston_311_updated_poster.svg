  <text x="80.0" y="2120.0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#475569" text-anchor="start">Limitations: 311 complaints reflect reported issues, not all defects. ZIP codes are screening units, not final engineering boundaries.</text>
